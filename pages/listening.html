<style>
  /* CSS-kan wuxuu xallinayaa cilladda responsive-ka ee desktop, tablet iyo mobile */
  .app-content-wrapper {
    flex: 1;
    min-width: 0; 
    display: flex;
    flex-direction: column;
    width: 100%;
  }

  /* Styling-ka Sidebar Scrolling-ka u oggolaanaya */
  .app-sidebar {
    display: flex;
    flex-direction: column;
    height: 100vh;
    position: sticky;
    top: 0;
  }

  .sidebar-nav {
    flex: 1;
    overflow-y: auto; /* Waxay oggolaanaysaa in menu-yada la dhex scroll-gareeyo */
    padding-right: var(--space-2);
  }

  /* Naqshadaynta quruxda badan ee Scrollbar-ka sidebar-ka dhexdiisa ah */
  .sidebar-nav::-webkit-scrollbar {
    width: 4px;
  }
  .sidebar-nav::-webkit-scrollbar-track {
    background: transparent;
  }
  .sidebar-nav::-webkit-scrollbar-thumb {
    background: var(--border-color, rgba(255, 255, 255, 0.1));
    border-radius: var(--radius-full);
  }

  /* Badhanka mobilka desktop-ka waa inuu ku qarsoonaadaa */
  button.sidebar-toggle-mobile {
    display: none !important;
  }

  /* ==========================================
     KAYDKA RESPONSIVE-KA (MOBILE RESPONSIVE CSS)
     ========================================== */
  @media (max-width: 768px) {
    .app-shell {
      display: flex;
      flex-direction: column;
    }

    /* QASAB INUU SOO MUUQDO MENU ICON-KA */
    button.sidebar-toggle-mobile {
      display: flex !important; 
      align-items: center;
      justify-content: center;
      background: rgba(255, 255, 255, 0.1) !important; 
      border: none !important;
      outline: none !important;
      cursor: pointer !important;
      padding: 8px !important;
      border-radius: 8px !important;
      width: 40px !important;
      height: 40px !important;
      z-index: 1000 !important;
    }

    /* Hubi midabka SVG-ga inuu cad yahay */
    button.sidebar-toggle-mobile svg {
      width: 24px !important;
      height: 24px !important;
      stroke: #ffffff !important; 
      display: block !important;
    }

    /* In sidebar-ka la qariyo marka hore */
    .app-sidebar {
      position: fixed;
      left: -280px;
      top: 0;
      width: 260px;
      background: var(--bg-surface, #111827);
      z-index: 9999; 
      transition: left 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 4px 0 15px rgba(0, 0, 0, 0.3);
    }

    /* Marka la furo (active) */
    .app-sidebar.active {
      left: 0;
    }

    /* Hagaajinta Topbar-ka iyo Main-ka ee mobilada */
    .app-topbar {
      padding: var(--space-4) !important;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border-color);
    }

    .app-main {
      padding: var(--space-4) !important;
    }
  }
</style>
</head>

<script src="../js/progress-store.js"></script>
<script src="../js/app-sidebar.js"></script>

<script src="../js/listening.js"></script>
<script>
  // Script-ka furaya/xiraya Menu-ga marka mobilka la joogo
  const mobileMenuBtn = document.getElementById('mobileMenuBtn');
  const appSidebar = document.getElementById('appSidebar');

  if (mobileMenuBtn && appSidebar) {
    mobileMenuBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      appSidebar.classList.toggle('active');
    });

    // Marka meel ka baxsan sidebar-ka la riixo inuu xirmo
    document.addEventListener('click', (e) => {
      if (appSidebar.classList.contains('active') && !appSidebar.contains(e.target) && e.target !== mobileMenuBtn) {
        appSidebar.classList.remove('active');
      }
    });
  }

  // Logout function
  document.getElementById('logout-link').addEventListener('click', (e) => {
    e.preventDefault();
    window.LinguaAuth.logout();
    window.location.href = '../index.html';
  });

  // Hubinta in user-ku uu maqalka (audio-ga) dhageysto 100% ka hor inta aan la gudbin
  document.addEventListener('play', function(e) {
    if (e.target && e.target.tagName === 'AUDIO') {
      const audio = e.target;
      
      // Marka uu audio-gu dhammaado (100% finished)
      audio.addEventListener('ended', function() {
        console.log("Audio finished playing 100%. User can now proceed.");
        // Waxaad halkan ku dari kartaa nidaamkaaga progress-ka haddii aad rabto inuu isla goobta ku update-gareeyo.
      });
    }
  }, true);
</script>
