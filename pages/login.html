<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Log In — LinguaRise</title>

<script src="../js/theme.js"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="../css/variables.css">
<link rel="stylesheet" href="../css/base.css">
<link rel="stylesheet" href="../css/components.css">

<style>
  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--gradient-soft);
    padding: var(--space-6);
  }
  .auth-wrap { width: 100%; max-width: 420px; }
  .auth-logo {
    display: flex; align-items: center; justify-content: center; gap: 10px;
    font-family: var(--font-display); font-weight: 700; font-size: var(--fs-xl);
    margin-bottom: var(--space-8);
  }
  .auth-card { padding: var(--space-8); }
  .auth-tabs { display: flex; gap: var(--space-2); background: var(--bg); border-radius: var(--radius-full); padding: 4px; margin-bottom: var(--space-8); }
  .auth-tab { flex: 1; text-align: center; padding: 10px; border-radius: var(--radius-full); font-size: var(--fs-sm); font-weight: 600; color: var(--text-muted); transition: background var(--t-fast), color var(--t-fast); }
  .auth-tab.active { background: var(--gradient-primary); color: #fff; }
  .field { margin-bottom: var(--space-5); }
  .field label { display: block; font-size: var(--fs-sm); font-weight: 600; margin-bottom: var(--space-2); }
  .field input {
    width: 100%; padding: 13px 16px; border-radius: var(--radius-sm);
    border: 1.5px solid var(--card-border); background: var(--bg);
    font-size: var(--fs-base); transition: border-color var(--t-fast);
  }
  .field input:focus { border-color: var(--primary); outline: none; }
  .auth-form { display: none; }
  .auth-form.active { display: block; }
  .auth-error { color: var(--danger); font-size: var(--fs-sm); margin-bottom: var(--space-4); display: none; }
  .auth-error.show { display: block; }
  .auth-submit { width: 100%; }
  .auth-back { display: flex; align-items: center; justify-content: center; gap: 6px; margin-top: var(--space-6); font-size: var(--fs-sm); color: var(--text-muted); }
</style>
</head>
<body>

<div class="auth-wrap">
  <a href="../index.html" class="auth-logo"><span class="mark" style="width:38px;height:38px;border-radius:11px;background:var(--gradient-primary);display:flex;align-items:center;justify-content:center;color:#fff;font-size:var(--fs-sm);">LR</span>LinguaRise</a>

  <div class="card auth-card">
    <div class="auth-tabs">
      <div class="auth-tab active" data-target="login-form">Log In</div>
      <div class="auth-tab" data-target="signup-form">Sign Up</div>
    </div>

    <!-- LOGIN -->
    <form class="auth-form active" id="login-form">
      <p class="auth-error" id="login-error"></p>
      <div class="field">
        <label for="login-email">Email</label>
        <input type="email" id="login-email" required placeholder="you@email.com">
      </div>
      <div class="field">
        <label for="login-password">Password</label>
        <input type="password" id="login-password" required placeholder="••••••••">
      </div>
      <button type="submit" class="btn btn-primary auth-submit">Log In</button>
    </form>

    <!-- SIGNUP -->
    <form class="auth-form" id="signup-form">
      <p class="auth-error" id="signup-error"></p>
      <div class="field">
        <label for="signup-name">Full name</label>
        <input type="text" id="signup-name" required placeholder="Muhannad Mohamed">
      </div>
      <div class="field">
        <label for="signup-email">Email</label>
        <input type="email" id="signup-email" required placeholder="you@email.com">
      </div>
      <div class="field">
        <label for="signup-password">Password</label>
        <input type="password" id="signup-password" required placeholder="••••••••" minlength="4">
      </div>
      <button type="submit" class="btn btn-primary auth-submit">Create Account</button>
    </form>
  </div>

  <a href="../index.html" class="auth-back">
    <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
    Back to Home
  </a>
</div>

<script src="../js/auth.js"></script>
<script>
  const tabs = document.querySelectorAll('.auth-tab');
  const forms = document.querySelectorAll('.auth-form');

  tabs.forEach((tab) => {
    tab.addEventListener('click', () => {
      tabs.forEach((t) => t.classList.remove('active'));
      forms.forEach((f) => f.classList.remove('active'));
      tab.classList.add('active');
      document.getElementById(tab.dataset.target).classList.add('active');
    });
  });

  function redirectAfterAuth() {
    const target = sessionStorage.getItem('linguarise-redirect');
    sessionStorage.removeItem('linguarise-redirect');
    window.location.href = target || 'dashboard.html';
  }

  document.getElementById('login-form').addEventListener('submit', (e) => {
    e.preventDefault();
    const email = document.getElementById('login-email').value;
    const password = document.getElementById('login-password').value;
    const errorEl = document.getElementById('login-error');
    const result = window.LinguaAuth.login(email, password);
    if (result.ok) {
      redirectAfterAuth();
    } else {
      errorEl.textContent = result.error;
      errorEl.classList.add('show');
    }
  });

  document.getElementById('signup-form').addEventListener('submit', (e) => {
    e.preventDefault();
    const name = document.getElementById('signup-name').value;
    const email = document.getElementById('signup-email').value;
    const password = document.getElementById('signup-password').value;
    const errorEl = document.getElementById('signup-error');
    const result = window.LinguaAuth.signup(name, email, password);
    if (result.ok) {
      redirectAfterAuth();
    } else {
      errorEl.textContent = result.error;
      errorEl.classList.add('show');
    }
  });

  // If already logged in, skip straight to dashboard
  if (window.LinguaAuth.isLoggedIn()) {
    window.location.href = 'dashboard.html';
  }
</script>
</body>
</html>
