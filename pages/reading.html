      z-index: 10000 !important;

      display: flex;

      align-items: center;
      border-bottom: 1px solid var(--border-color);
    }

    .app-main {
      padding: var(--space-4) !important;
    }
  }

<!-- =======================================================
     JS FILES-KA HOOSE (Nidaamsan oo badbaado leh)
     ======================================================= -->
<script src="../js/progress-store.js"></script>

<script src="../js/certificate.js"></script>
<script src="../js/quiz-engine.js"></script>

<script src="../js/main.js"></script>

<script>
  // =========================================================================
  // ⚡ 1. GLOBAL UI (NAVBAR, SCROLL, SIDEBAR & DARK MODE)
  // Qaybtaan waxay shaqaynaysaa isla markiiba si gooni ah oo ka madax-bannaan Supabase.
  // =========================================================================
  (function initGlobalUI() {
    // Mobile Menu Toggle
    const mobileMenuBtn = document.getElementById('mobileMenuBtn');
    const appSidebar = document.getElementById('appSidebar');

    if (mobileMenuBtn && appSidebar) {
      mobileMenuBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        appSidebar.classList.toggle('active');
      });

      // Marka meel ka baxsan sidebar-ka la riixo inuu xirmo
      document.addEventListener('click', (e) => {
        if (appSidebar.classList.contains('active') && !appSidebar.contains(e.target) && e.target !== mobileMenuBtn) {
          appSidebar.classList.remove('active');
        }
      });
    }

    // Local Dark Mode Toggle selector
    const btnTheme = document.getElementById('localThemeToggle');
    if (btnTheme) {
      btnTheme.onclick = (e) => {
        e.preventDefault();
        const isCurrentlyDark = document.documentElement.getAttribute('data-theme') === 'dark';
        if (isCurrentlyDark) {
          document.documentElement.removeAttribute('data-theme');
          localStorage.setItem('theme', 'light');
          btnTheme.setAttribute('aria-pressed', 'false');
        } else {
          document.documentElement.setAttribute('data-theme', 'dark');
          localStorage.setItem('theme', 'dark');
          btnTheme.setAttribute('aria-pressed', 'true');
        }
      };
      const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
      btnTheme.setAttribute('aria-pressed', isDark ? 'true' : 'false');
    }
  })();


  // =========================================================================
  // 🔐 2. HUBINTA SUPABASE & RORIDDA CASHARRADA (SIDA UGU FUDUD EE UI-GA LOO BADBAADIYO)
  // Waxay hubineysaa aqoonsiga isticmaalaha iyo casharradiisa gaarka ah asynchronouse-ly.
  // =========================================================================
  async function checkUserSession() {
    try {
      // Hubi in nidaamka Auth uu dhashay ka hor intaan la kicin
      if (!window.LinguaAuth || typeof window.LinguaAuth.currentUser !== 'function') {
        console.warn("Nidaamka LinguaAuth wali ma diyaarsana, dib u isku day 300ms kadib.");
        setTimeout(checkUserSession, 300);
        return;
      }

      // Xaqiiji isticmaalaha hadda soo galay
      const user = await window.LinguaAuth.currentUser();
      if (!user) {
        console.log("Ma jiro isticmaale firfircoon, dib loogu celinayo boggii hore.");
        window.location.href = '../index.html';
        return;
      }

      // Deji Avatar-ka geeska sare ee Header-ka ku yaal
      const avatarEl = document.getElementById('topbar-avatar');
      if (avatarEl) {
        if (user.avatar) {
          avatarEl.style.backgroundImage = `url(${user.avatar})`;
          avatarEl.textContent = '';
        } else if (user.name) {
          avatarEl.textContent = user.name.trim().split(' ').map(n => n[0]).slice(0, 2).join('').toUpperCase();
        }
      }

      // 🛡️ Ka saar isku dhex yaaca: Ku xidh horumarka (Progress-ka) kaliya ID-ga isticmaalaha hadda galay
      const userId = user.id ? String(user.id).trim() : null;
      if (userId && window.LinguaProgress && typeof window.LinguaProgress.initUser === 'function') {
        window.LinguaProgress.initUser(userId);
      }

      // 🎯 KICI CAYAARTA QAAB "GADAAL AH" (ASYNC CHUNKING TO PREVENT FREEZE)
      if (typeof initLessonQuizEngine === 'function' && typeof READING_LEVELS !== 'undefined') {
        
        // requestAnimationFrame iyo setTimeout waxay daryeelayaan in Scroll-ku had iyo jeer shaqeeyo
        requestAnimationFrame(() => {
          setTimeout(() => {
            try {
              initLessonQuizEngine('reading', READING_LEVELS);
              console.log("Quiz Engine-ka waa la roray iyadoo la ilaalinayo scroll-ka!");
            } catch (renderError) {
              console.error("Cillad ayaa ka dhacday gudaha initLessonQuizEngine:", renderError);
            }
          }, 50); // Sugitaan yar oo 50ms ah si browser-ku u neefsado
        });

      } else {
        console.error("Matoorka ciyaarta (quiz-engine.js) ama xogta reading-ka lama helin.");
      }

    } catch (err) {
      console.error("Cillad ayaa ku dhacday hubinta session-ka Supabase:", err);
      window.location.href = '../index.html';
    }
  }

  // Kici hubinta amniga marka uu DOM-ku dhasho
  document.addEventListener('DOMContentLoaded', checkUserSession);

  // Logout function — Asynchronous si uu u tirtiro session-ka Supabase
  const logoutBtn = document.getElementById('logout-link');
  if (logoutBtn) {
    logoutBtn.addEventListener('click', async (e) => {
      e.preventDefault();
      try {
        if (window.LinguaAuth && typeof window.LinguaAuth.logout === 'function') {
          await window.LinguaAuth.logout();
        }
      } catch (err) {
        console.error("Logout error:", err);
      } finally {
        window.location.href = '../index.html';
      }
    });
  }
</script>
