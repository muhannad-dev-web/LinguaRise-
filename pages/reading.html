<!-- Sanduuqa Qaladaadka lagu baaro (Kaliya wuxuu soo muuqanayaa haddii qalad jiro) -->
<div id="debug-console">
  <strong>System Error Detected:</strong>
  <div id="debug-message" style="margin-top: 5px; white-space: pre-wrap;"></div>
</div>

<script>
  // Ka hortagga in boggu madoobaado haddii CSS uu soo daaho
  (function() {
    try {
      const savedTheme = localStorage.getItem('theme');
      if (savedTheme === 'dark' || (!savedTheme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.setAttribute('data-theme', 'dark');
      }
    } catch(e) {}
  })();

  // Qalad-qabte caalami ah (Global Error Handler)
  window.onerror = function(message, source, lineno, colno, error) {
    const consoleDiv = document.getElementById('debug-console');
    const msgDiv = document.getElementById('debug-message');
    if (consoleDiv && msgDiv) {
      consoleDiv.style.display = 'block';
      msgDiv.textContent = `${message}\n\nFile: ${source.split('/').pop()}\nLine: ${lineno}`;
    }
    return false;
  };
</script>

<!-- =======================================================
     AAD U MUHIIM: JAVASCRIPT-KA OO LA RARAYO SIDA AY ISUGU XIRAN YIHIIN (ORDER)
     ======================================================= -->
<!-- 1. Supabase & Auth kii ugu horeeyay oo caadi ah (Caan ah) -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/theme.js"></script>

<script src="../js/auth-guard.js"></script>

<!-- 2. Progress store iyo data-da casharada -->
<script src="../js/progress-store.js"></script>

<!-- 3. Dynamic UI generators (kuwa dhisa badhamada iyo casharada) -->
<script src="../js/certificate.js"></script>
<script src="../js/quiz-engine.js"></script>
<script src="../js/app-sidebar.js"></script>
<script src="../js/main.js"></script>

<script>
  // ==========================================
  // BADHAMADA CORE-KA AH EE BOGGA
  // ==========================================
  document.addEventListener('DOMContentLoaded', () => {
    const btnMenu = document.getElementById('mobileMenuBtn');
    const sidebar = document.getElementById('appSidebar');
    const btnTheme = document.getElementById('localThemeToggle');

    // 1. MOBILE MENU CLICK EVENT
    if (btnMenu && sidebar) {
      btnMenu.onclick = (e) => {
        e.preventDefault();
        e.stopPropagation();
        sidebar.classList.toggle('active');
      };

      document.onclick = (e) => {
        if (sidebar.classList.contains('active') && !sidebar.contains(e.target) && e.target !== btnMenu) {
          sidebar.classList.remove('active');
        }
      };
    }

    // 2. DARK MODE TOGGLE
    if (btnTheme) {
      btnTheme.onclick = (e) => {
        e.preventDefault();
        const isCurrentlyDark = document.documentElement.getAttribute('data-theme') === 'dark';
        if (isCurrentlyDark) {
          document.documentElement.removeAttribute('data-theme');
          localStorage.setItem('theme', 'light');
          btnTheme.setAttribute('aria-pressed', 'false');
        } else {
          document.documentElement.setAttribute('data-theme', 'dark');
          localStorage.setItem('theme', 'dark');
          btnTheme.setAttribute('aria-pressed', 'true');
        }
      };
      
      const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
      btnTheme.setAttribute('aria-pressed', isDark ? 'true' : 'false');
    }
  });

  // ==========================================
  // 3. LOGOUT EVENT
  // ==========================================
  const logoutLink = document.getElementById('logout-link');
  if (logoutLink) {
    logoutLink.onclick = async (e) => {
      e.preventDefault();
      try {
        if (window.LinguaAuth && typeof window.LinguaAuth.logout === 'function') {
          await window.LinguaAuth.logout();
        }
      } catch (err) {
        console.error("Logout error:", err);
      } finally {
        window.location.href = '../index.html';
      }
    };
  }

  // ==========================================
  // 🚀 BILOWGA NIDAAMKA READ PRACTICE
  // ==========================================
  async function initReadingLessons() {
    try {
      if (!window.LinguaAuth || typeof window.LinguaAuth.currentUser !== 'function') {
        setTimeout(initReadingLessons, 100);
        return;
      }

      const user = await window.LinguaAuth.currentUser();
      if (!user) {
        window.location.href = '../index.html';
        return;
      }

      if (window.LinguaProgress && typeof window.LinguaProgress.initUser === 'function') {
        window.LinguaProgress.initUser(user.id);
      }

      // Hubi in READING_LEVELS iyo Engine-ku ay diyaar yihiin
      if (typeof initLessonQuizEngine === 'function' && typeof READING_LEVELS !== 'undefined') {
        initLessonQuizEngine('reading', READING_LEVELS);
      } else {
        console.warn("Quiz engine or reading data is missing. Retrying...");
        setTimeout(initReadingLessons, 200);
      }
    } catch (err) {
      console.error("Reading initialization failed:", err);
    }
  }

  // Toos u kici rarka ka dib
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', initReadingLessons);
  } else {
    initReadingLessons();
  }
</script>
