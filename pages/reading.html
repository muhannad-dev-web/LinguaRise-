<script>
  // =========================================================================
  // ⚡ 1. GLOBAL LOCAL THEME TOGGLE (DARK MODE)
  // =========================================================================
  (function initThemeUI() {
    const btnTheme = document.getElementById('localThemeToggle');
    if (btnTheme) {
      btnTheme.onclick = (e) => {
        e.preventDefault();
        const isCurrentlyDark = document.documentElement.getAttribute('data-theme') === 'dark';
        if (isCurrentlyDark) {
          document.documentElement.removeAttribute('data-theme');
          localStorage.setItem('theme', 'light');
          btnTheme.setAttribute('aria-pressed', 'false');
        } else {
          document.documentElement.setAttribute('data-theme', 'dark');
          localStorage.setItem('theme', 'dark');
          btnTheme.setAttribute('aria-pressed', 'true');
        }
      };
      const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
      btnTheme.setAttribute('aria-pressed', isDark ? 'true' : 'false');
    }
  })();

  // =========================================================================
  // 🔐 2. HUBINTA SUPABASE SESSION & RORIDDA CASHARRADA
  // =========================================================================
  async function checkUserSession() {
    try {
      if (!window.LinguaAuth || typeof window.LinguaAuth.currentUser !== 'function') {
        setTimeout(checkUserSession, 150);
        return;
      }

      const user = await window.LinguaAuth.currentUser();
      if (!user) {
        window.location.href = '../index.html';
        return;
      }

      // Set Avatar
      const avatarEl = document.getElementById('topbar-avatar');
      if (avatarEl) {
        if (user.avatar) {
          avatarEl.style.backgroundImage = `url(${user.avatar})`;
          avatarEl.textContent = '';
        } else if (user.name) {
          avatarEl.textContent = user.name.trim().split(' ').map(n => n[0]).slice(0, 2).join('').toUpperCase();
        }
      }

      // 🛡️ User Progress-Store Syncing (Xallinta Isku-dhaca Storage-ka)
      const userId = user.id ? String(user.id).trim() : null;
      if (userId && window.LinguaProgress) {
        // Ku kaydi Progress-ka ID-ga gaarka ah ee isticmaalaha si uusan qof kale u dhexgalin
        const originalLoad = window.LinguaProgress.get;
        window.LinguaProgress.initUser = function(id) {
          this.userKey = `linguarise-progress-${id}`;
        };
        window.LinguaProgress.initUser(userId);
      }

      // 🎯 Roridda "Asynchronous" ah si loo badbaadiyo UI-ga iyo Scroll-ka
      if (typeof initLessonQuizEngine === 'function' && typeof READING_LEVELS !== 'undefined') {
        
        requestAnimationFrame(() => {
          setTimeout(() => {
            try {
              initLessonQuizEngine('reading', READING_LEVELS);
              console.log("Quiz Engine-ka waa la roray si badbaado leh!");
            } catch (renderError) {
              console.error("Cillad dhalinta casharka:", renderError);
            }
          }, 40); 
        });

      } else {
        console.error("Matoorka ciyaarta (quiz-engine.js) ama xogta reading-ka lama helin.");
      }

    } catch (err) {
      console.error("Cillad ayaa ku dhacday hubinta session-ka Supabase:", err);
      window.location.href = '../index.html';
    }
  }

  document.addEventListener('DOMContentLoaded', checkUserSession);

  // Logout Action
  const logoutBtn = document.getElementById('logout-link');
  if (logoutBtn) {
    logoutBtn.addEventListener('click', async (e) => {
      e.preventDefault();
      try {
        if (window.LinguaAuth && typeof window.LinguaAuth.logout === 'function') {
          await window.LinguaAuth.logout();
        }
      } catch (err) {
        console.error("Logout error:", err);
      } finally {
        window.location.href = '../index.html';
      }
    });
  }
</script>
